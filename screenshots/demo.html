<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Irrigation Sequencer Cards - Demo</title>
<style>
  :root {
    --primary-color: #03a9f4;
    --success-color: #4caf50;
    --warning-color: #ff9800;
    --error-color: #db4437;
    --info-color: #03a9f4;
    --disabled-text-color: #9e9e9e;
    --primary-text-color: #212121;
    --secondary-text-color: #727272;
    --divider-color: #e0e0e0;
    --card-background-color: #ffffff;
    --secondary-background-color: #f0f2f5;
    --primary-background-color: #fafafa;
  }
  body {
    margin: 0;
    padding: 32px;
    background: var(--primary-background-color);
    font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--primary-text-color);
    display: flex;
    justify-content: center;
  }
  .frame { width: 420px; display: flex; flex-direction: column; gap: 16px; }
  .frame.wide { width: 640px; }

  /* Minimal ha-card polyfill so the card looks right outside a real HA frontend */
  ha-card {
    display: block;
    background: var(--card-background-color);
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
  }

  /* Minimal ha-icon polyfill (emoji fallback, real HA renders proper MDI SVGs) */
  ha-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="frame">
    <irrigation-sequencer-status-card id="status-card"></irrigation-sequencer-status-card>
    <irrigation-sequencer-settings-card id="settings-card"></irrigation-sequencer-settings-card>
  </div>

  <script>
    // Emoji fallback so ha-icon renders something in this standalone demo.
    const ICONS = {
      "mdi:drag-vertical": "⋮⋮",
      "mdi:sprinkler-variant": "💧",
      "mdi:sprinkler": "💦",
      "mdi:timer-sand": "⏳",
      "mdi:weather-night": "🌙",
      "mdi:snowflake": "❄️",
      "mdi:weather-rainy": "🌧️",
      "mdi:weather-partly-cloudy": "⛅",
      "mdi:cloud-outline": "☁️",
      "mdi:thermometer-low": "🌡️",
      "mdi:thermometer-high": "🌡️",
      "mdi:water-percent": "💧",
      "mdi:play": "▶️",
      "mdi:stop": "⏹️",
      "mdi:tune-variant": "🎛️",
      "mdi:calendar-clock": "📅",
    };
    class HaIcon extends HTMLElement {
      static get observedAttributes() { return ["icon"]; }
      connectedCallback() { this._render(); }
      attributeChangedCallback() { this._render(); }
      _render() { this.textContent = ICONS[this.getAttribute("icon")] || ""; }
    }
    class HaCard extends HTMLElement {
      connectedCallback() {
        if (!this.querySelector(".ha-card-inner")) {
          const wrapper = document.createElement("div");
          wrapper.className = "ha-card-inner";
          wrapper.style.padding = "16px";
          while (this.firstChild) wrapper.appendChild(this.firstChild);
          this.appendChild(wrapper);
        }
      }
    }
    customElements.define("ha-icon", HaIcon);
    customElements.define("ha-card", HaCard);
  </script>

  <!-- Classic (non-module) script: type="module" scripts are blocked by CORS
       when a page is opened directly as a file:// URL in most browsers,
       which left this demo blank. The card file itself has no import/export
       statements, so a plain <script src> works everywhere, offline. -->
  <script src="../irrigation-sequencer-card/irrigation-sequencer-card.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const scenario = params.get("scenario") || "idle";
    const lang = params.get("lang") || "en";
    const layout = params.get("layout") || "vertical";
    if (layout === "horizontal") document.querySelector(".frame").classList.add("wide");

    // A couple of zones get a custom name (the "name" field) to demonstrate
    // that it overrides the underlying entity's friendly_name; the rest
    // fall back to the entity name.
    const zoneEntityNames_en = ["Sprinkler relay 1", "Sprinkler relay 2", "Sprinkler relay 3", "Sprinkler relay 4", "Sprinkler relay 5"];
    const zoneEntityNames_de = ["Sprinkler-Relais 1", "Sprinkler-Relais 2", "Sprinkler-Relais 3", "Sprinkler-Relais 4", "Sprinkler-Relais 5"];
    const zoneCustomNames_en = ["Front lawn", "Back lawn", "", "Vegetable garden", ""];
    const zoneCustomNames_de = ["Vorgarten", "Rasen hinten", "", "Gemüsegarten", ""];

    const entityNames = lang === "de" ? zoneEntityNames_de : zoneEntityNames_en;
    const customNames = lang === "de" ? zoneCustomNames_de : zoneCustomNames_en;

    const zoneEntities = entityNames.map((_, i) => `switch.zone_${i + 1}`);
    const zones = zoneEntities.map((entity_id, i) => ({
      entity_id,
      name: customNames[i],
      duration_minutes: [12, 8, 15, 10, 6][i],
      position: i,
    }));

    const isRunning = scenario === "running";

    const statusAttrs = {
      entry_id: "demo_entry",
      zones,
      pause_between_zones_seconds: 120,
      start_times: ["05:00:00", "18:30:00"],
      winter_mode: false,
      rain_pause_until: null,
      current_zone_index: isRunning ? 2 : null,
      last_zone_index: isRunning ? 2 : null,
      current_zone_entity_id: isRunning ? "switch.zone_3" : null,
      seconds_remaining_zone: isRunning ? 320 : 0,
      seconds_remaining_total: isRunning ? 940 : 0,
      next_run: "2026-07-19T05:00:00+02:00",
      weather_adjustment_enabled: true,
      weather_entity: "weather.home",
      weather_reference_temp: 20,
      weather_hot_temp: 30,
      weather_hot_factor: 2.0,
      weather_current_temp: 27,
      weather_current_factor: 1.7,
      notify_target: null,
    };
    const recomputeEstimatedTotalSeconds = () => {
      statusAttrs.estimated_total_seconds =
        statusAttrs.zones.reduce((sum, z) => sum + z.duration_minutes * 60, 0) +
        statusAttrs.pause_between_zones_seconds * Math.max(0, statusAttrs.zones.length - 1);
    };
    recomputeEstimatedTotalSeconds();

    const states = {
      "sensor.lawn_irrigation_status": {
        entity_id: "sensor.lawn_irrigation_status",
        state: isRunning ? "running" : "idle",
        attributes: statusAttrs,
      },
      "weather.home": {
        entity_id: "weather.home",
        state: "sunny",
        attributes: {
          friendly_name: lang === "de" ? "Zuhause" : "Home",
          temperature: 27,
          forecast: [{ temperature: 31, templow: 18, condition: "sunny" }],
        },
      },
    };

    zoneEntities.forEach((id, i) => {
      states[id] = { entity_id: id, state: "off", attributes: { friendly_name: entityNames[i] } };
    });

    const hass = {
      language: lang,
      locale: { language: lang },
      states,
      services: {
        notify: {
          mobile_app_pixel_8: {},
          mobile_app_iphone: {},
        },
      },
      callService: () => Promise.resolve(),
    };

    const statusTitle = lang === "de" ? "Rasenbewässerung" : "Lawn Irrigation";
    const settingsTitle = lang === "de" ? "Bewässerung – Einstellungen" : "Lawn Irrigation – Settings";

    const statusCard = document.getElementById("status-card");
    statusCard.setConfig({ entity: "sensor.lawn_irrigation_status", title: statusTitle, layout });
    statusCard.hass = hass;

    // Stateful mock so demo.html is actually interactive: services below
    // mutate statusAttrs and push a fresh hass object to both cards, the
    // same round trip a real Home Assistant instance does after a service
    // call updates the sensor.
    const pushHassUpdate = () => {
      hass.states["sensor.lawn_irrigation_status"] = {
        ...hass.states["sensor.lawn_irrigation_status"],
        attributes: { ...statusAttrs },
      };
      const nextHass = { ...hass, states: { ...hass.states } };
      statusCard.hass = nextHass;
      settingsCard.hass = nextHass;
    };
    hass.callService = (domain, service, data) => {
      if (domain !== "irrigation_sequencer") return Promise.resolve();
      const zone = (id) => statusAttrs.zones.find((z) => z.entity_id === id);
      if (service === "set_start_times") statusAttrs.start_times = data.start_times;
      if (service === "set_zone_duration" && zone(data.entity_id)) {
        zone(data.entity_id).duration_minutes = data.minutes;
        recomputeEstimatedTotalSeconds();
      }
      if (service === "set_zone_name" && zone(data.entity_id)) zone(data.entity_id).name = data.name;
      if (service === "set_pause_between_zones") {
        statusAttrs.pause_between_zones_seconds = data.seconds;
        recomputeEstimatedTotalSeconds();
      }
      if (service === "set_rain_pause") {
        const d = new Date();
        d.setDate(d.getDate() + data.days);
        statusAttrs.rain_pause_until = d.toISOString().slice(0, 10);
      }
      if (service === "clear_rain_pause") statusAttrs.rain_pause_until = null;
      if (service === "set_winter_mode") statusAttrs.winter_mode = data.enabled;
      if (service === "set_notify_target") statusAttrs.notify_target = data.target || null;
      if (service === "set_weather_adjustment") {
        Object.assign(statusAttrs, {
          weather_adjustment_enabled: data.enabled,
          weather_entity: data.weather_entity,
          weather_reference_temp: data.reference_temp,
          weather_hot_temp: data.hot_temp,
          weather_hot_factor: data.hot_factor,
        });
      }
      if (service === "set_zone_order") {
        statusAttrs.zones = data.zones.map((id, i) => ({ ...zone(id), position: i }));
      }
      // Simulate a real service call's network round trip (the demo mock
      // would otherwise resolve instantly, which never exercises the
      // pending-promise path in _releaseRenderSuppression the way a real
      // Home Assistant instance does).
      return new Promise((resolve) => setTimeout(() => {
        pushHassUpdate();
        resolve();
      }, 400));
    };

    const settingsCard = document.getElementById("settings-card");
    settingsCard.setConfig({ entity: "sensor.lawn_irrigation_status", title: settingsTitle, layout });
    settingsCard.hass = hass;
  </script>
</body>
</html>
